<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Tea & Coffee Premium Store</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
}

header {
  background: #2c3e50;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  max-width: 600px;
  background: white;
  margin: 30px auto;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

.form-group {
  margin-bottom: 15px;
}

label {
  font-weight: bold;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #27ae60;
  color: white;
  border: none;
  font-size: 16px;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #219150;
}

.error {
  color: red;
  font-size: 14px;
}

.success {
  text-align: center;
  color: green;
  margin-top: 15px;
}
body.dark {
  background: #121212;
  color: #fff;
}

body.dark header {
  background: #1e1e1e;
  color: #fff;
}

body.dark .container {
  background: #1e1e1e;
  color: #fff;
}

body.dark input,
body.dark textarea,
body.dark select {
  background: #2a2a2a;
  color: #fff;
  border: 1px solid #444;
}

body.dark input::placeholder,
body.dark textarea::placeholder {
  color: #bbb;
}

body.dark button {
  background: #27ae60;
}

body.dark .error {
  color: #ff6b6b;
}

body.dark .success {
  color: #00e676;
}
</style>
</head>

<body>

<header>
  <h1>Checkout</h1>
</header>

<div class="container">
  <h2>Billing Details</h2>

  <form id="checkoutForm">

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name">
      <div class="error" id="nameError"></div>
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" id="phone">
      <div class="error" id="phoneError"></div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="text" id="email">
      <div class="error" id="emailError"></div>
    </div>

    <div class="form-group">
      <label>Address</label>
      <textarea id="address"></textarea>
      <div class="error" id="addressError"></div>
    </div>

    <div class="form-group">
      <label>Payment Method</label>
      <select id="payment">
        <option value="">Select</option>
        <option value="cod">Cash on Delivery</option>
        <option value="upi">UPI</option>
        <option value="card">Card</option>
      </select>
      <div class="error" id="paymentError"></div>
    </div>

    <button type="submit">Place Order</button>

    <div class="success" id="successMsg"></div>

  </form>
</div>

<script>
document.getElementById("checkoutForm").addEventListener("submit", function(e){
  e.preventDefault();

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let email = document.getElementById("email").value.trim();
  let address = document.getElementById("address").value.trim();
  let payment = document.getElementById("payment").value;

  let isValid = true;

  // Clear errors
  document.querySelectorAll(".error").forEach(e => e.innerText = "");
  document.getElementById("successMsg").innerText = "";

  // Name validation
  if(name === ""){
    document.getElementById("nameError").innerText = "Name is required";
    isValid = false;
  }

  // Phone validation
  if(!/^[0-9]{10}$/.test(phone)){
    document.getElementById("phoneError").innerText = "Enter valid 10 digit number";
    isValid = false;
  }

  // Email validation
  if(!/^\S+@\S+\.\S+$/.test(email)){
    document.getElementById("emailError").innerText = "Enter valid email";
    isValid = false;
  }

  // Address validation
  if(address.length < 10){
    document.getElementById("addressError").innerText = "Address too short";
    isValid = false;
  }

  // Payment validation
  if(payment === ""){
    document.getElementById("paymentError").innerText = "Select payment method";
    isValid = false;
  }

  if(isValid){
    document.getElementById("successMsg").innerText = "✅ Order Placed Successfully!";
    
    // Optional: Clear cart
    localStorage.removeItem("cart");

    // Reset form
    document.getElementById("checkoutForm").reset();
  }

});
</script>
<script src="js/theme.js"></script>

</body>
</html>
