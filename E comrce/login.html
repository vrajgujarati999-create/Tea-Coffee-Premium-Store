<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px gray;
  text-align: center;
}

input {
  padding: 10px;
  width: 100%;
  margin: 10px 0;
}

button {
  padding: 10px;
  width: 100%;
  background: black;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="box">
  <h2>Admin Login</h2>
  <input type="password" id="adminPass" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  let pass = document.getElementById("adminPass").value;

  if(pass === "admin123"){
    localStorage.setItem("isAdmin", "true");
    window.location.href = "admin.html"; // ✅ direct admin page
  } else {
    alert("Wrong Password");
  }
}
</script>

</body>
</html>
